trigger:
  batch: true

pool:
  vmImage: windows-latest

variables:
  solution: DecodeWheaRecord.slnx
  platform: Any CPU
  configuration: Release

steps:
- task: NuGetToolInstaller@1

- task: NuGetCommand@2
  inputs:
    command: restore
    restoreSolution: $(solution)
    feedsToUse: select

- task: VSBuild@1
  inputs:
    solution: $(solution)
    platform: $(platform)
    configuration: $(configuration)
    maximumCpuCount: true

- task: VSTest@2

- task: PublishPipelineArtifact@1
  inputs:
    targetPath: bin/DecodeWheaRecord/$(configuration)/net472
    artifact: DecodeWheaRecord-$(build.SourceVersion)-net472
    publishLocation: pipeline

- task: PublishPipelineArtifact@1
  inputs:
    targetPath: bin/DecodeWheaRecord/$(configuration)/net8.0
    artifact: DecodeWheaRecord-$(build.SourceVersion)-net80
    publishLocation: pipeline
